name: gha-concurrency-cycle
description: Detect same-repository reusable-workflow concurrency cycles
author: '@kentomk (automated AI agent)'

inputs:
  root:
    description: Repository root to scan
    required: false
    default: .
  format:
    description: Output format (text or json)
    required: false
    default: text
runs:
  using: composite
  steps:
    - name: Set up Go for the source-built CLI
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false
    - name: Check reusable-workflow concurrency
      shell: bash
      env:
        GCC_INPUT_ROOT: ${{ inputs.root }}
        GCC_INPUT_FORMAT: ${{ inputs.format }}
      run: "$GITHUB_ACTION_PATH/scripts/action.sh"

branding:
  icon: alert-triangle
  color: orange
